<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QGAN Medical Super-Resolution</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/main.js" defer></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 py-6 border-b border-slate-800">
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-cyan-400">QGAN SuperRes</p>
        <h1 class="text-3xl sm:text-4xl font-semibold mt-2">Medical Image Enhancement</h1>
      </div>
      <nav class="flex flex-wrap gap-3 text-sm text-slate-300">
        <a href="/" class="hover:text-white">Upload</a>
        <a href="/gallery" class="hover:text-white">Gallery</a>
        {% if user %}
        <a href="/profile" class="hover:text-white">Profile</a>
        {% if user.is_admin %}
        <a href="/admin" class="hover:text-white">Admin</a>
        {% endif %}
        <a href="/logout" class="hover:text-white">Logout</a>
        {% else %}
        <a href="/login" class="hover:text-white">Login</a>
        <a href="/register" class="hover:text-white">Register</a>
        {% endif %}
      </nav>
    </header>

    <main class="py-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="py-6 border-t border-slate-800 text-slate-500 text-sm text-center">
      Built for quick medical image super-resolution previews by Pinkee Sharma.
    </footer>
  </div>
</body>
</html>
